name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Go build + test ──────────────────────────────────────────────────────────
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install SQLite dev libs (needed for cgo)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential pkg-config

      - name: Build GUI placeholder (so //go:embed all:dist works)
        run: |
          mkdir -p internal/webui/dist
          touch internal/webui/dist/.gitkeep
          echo '<html><body>CI placeholder</body></html>' > internal/webui/dist/index.html

      - name: go mod tidy
        run: go mod tidy

      - name: go build
        run: CGO_ENABLED=1 go build ./...

      - name: go test
        run: CGO_ENABLED=1 go test ./... -v -timeout 60s

      - name: go vet
        run: go vet ./...

  # ── GUI build ────────────────────────────────────────────────────────────────
  gui:
    name: GUI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install dependencies
        working-directory: gui
        run: npm ci

      - name: Build
        working-directory: gui
        run: npm run build

  # ── Python SDK lint ──────────────────────────────────────────────────────────
  python:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK
        working-directory: sdk/python
        run: pip install -e . --quiet

      - name: Basic import check
        run: python3 -c "import soulacy; print('SDK ok')"
