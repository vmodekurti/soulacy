name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ghcr.io/soulacy/soulacy

jobs:
  # ── Build Linux binaries (inside Docker for cgo cross-compile) ───────────────
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release binary via Dockerfile.release
        run: |
          VERSION="${{ github.ref_name }}"
          DOCKER_BUILDKIT=1 docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --build-arg VERSION="${VERSION}" \
            -f Dockerfile.release \
            -t soulacy-release:linux-${{ matrix.arch }} \
            --load .

      - name: Extract binaries
        run: |
          mkdir -p bin/release
          docker create --name soulacy-extract soulacy-release:linux-${{ matrix.arch }}
          docker cp soulacy-extract:/out/soulacy bin/release/soulacy-linux-${{ matrix.arch }}
          docker cp soulacy-extract:/out/sy      bin/release/sy-linux-${{ matrix.arch }}
          docker rm soulacy-extract

      - name: Create tarballs
        run: |
          VERSION="${{ github.ref_name }}"
          cd bin/release
          # Rename to plain names for the tarball, then archive both binaries
          # together. install.sh expects: soulacy_<version>_linux_<arch>.tar.gz
          cp soulacy-linux-${{ matrix.arch }} soulacy
          cp sy-linux-${{ matrix.arch }} sy
          tar czf soulacy_${VERSION}_linux_${{ matrix.arch }}.tar.gz soulacy sy
          rm soulacy sy

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: bin/release/*.tar.gz

  # ── Build macOS binaries (native, on macOS runner) ───────────────────────────
  build-darwin:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-14      # Apple Silicon runner
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js (for GUI build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Build GUI
        working-directory: gui
        run: npm ci && npm run build

      - name: Build binaries
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p bin/release
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build \
              -ldflags "-X github.com/soulacy/soulacy/internal/config.Version=${VERSION}" \
              -o bin/release/soulacy-darwin-${{ matrix.arch }} ./cmd/soulacy
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build \
              -ldflags "-X github.com/soulacy/soulacy/internal/config.Version=${VERSION}" \
              -o bin/release/sy-darwin-${{ matrix.arch }} ./cmd/sy

      - name: Create tarballs
        run: |
          VERSION="${{ github.ref_name }}"
          cd bin/release
          cp soulacy-darwin-${{ matrix.arch }} soulacy
          cp sy-darwin-${{ matrix.arch }} sy
          tar czf soulacy_${VERSION}_darwin_${{ matrix.arch }}.tar.gz soulacy sy
          rm soulacy sy

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: bin/release/*.tar.gz

  # ── Build and push Docker image ───────────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release with all artifacts ─────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec sha256sum {} \; | sort > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Soulacy ${{ github.ref_name }}"
          body: |
            ## Soulacy ${{ github.ref_name }}

            ### Installation

            **One-line Mac install** (from source):
            ```bash
            bash scripts/mac-install.sh
            ```

            **One-line Linux install**:
            ```bash
            curl -sSL https://github.com/soulacy/soulacy/releases/download/${{ github.ref_name }}/linux-install.sh | sudo bash
            ```

            **Docker (full stack)**:
            ```bash
            curl -o docker-compose.yml https://raw.githubusercontent.com/soulacy/soulacy/${{ github.ref_name }}/docker-compose.yml
            docker compose up
            ```

            **Docker (SQLite only)**:
            ```bash
            docker pull ghcr.io/soulacy/soulacy:${{ github.ref_name }}
            docker run -p 18789:18789 -v ~/.soulacy:/home/soulacy/.soulacy ghcr.io/soulacy/soulacy:${{ github.ref_name }}
            ```

            ### Downloads
            | Platform | Binary |
            |----------|--------|
            | macOS Apple Silicon | `soulacy_${{ github.ref_name }}_darwin_arm64.tar.gz` |
            | macOS Intel | `soulacy_${{ github.ref_name }}_darwin_amd64.tar.gz` |
            | Linux x86_64 | `soulacy_${{ github.ref_name }}_linux_amd64.tar.gz` |
            | Linux ARM64 | `soulacy_${{ github.ref_name }}_linux_arm64.tar.gz` |

            See `checksums.sha256` to verify downloads.
          files: |
            artifacts/**/*.tar.gz
            artifacts/checksums.sha256
          generate_release_notes: true
          fail_on_unmatched_files: false
