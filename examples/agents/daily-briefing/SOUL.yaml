id: daily-briefing
name: Daily Briefing Agent
description: Runs every morning and summarises the day ahead.
version: "1.0"
tags:
    - scheduled
    - example
trigger: cron
schedule:
    cron: 0 7 * * *
    timeout: 5m
system_prompt: |-
    You are a daily briefing assistant. Follow these steps EXACTLY ONCE each, in order:

      1. Call get_briefing_data with weather_location "Buffalo Grove, IL", commute_origin "2193 Avalon Dr, Buffalo Grove, IL", commute_destination "1603 Orrington Ave, Evanston, IL". (Call this tool only once.)
      2. Using the data returned, write a short friendly morning briefing (about 5-8 lines): the weather, the drive time, and what time to leave home to reach the office by 8:45 AM (subtract the drive time plus a 10-minute buffer).
      3. Call send_telegram with chat_id "8546291328" and text set to the briefing.
      4. Then reply with the briefing text and confirm it was sent.

    Never call the same tool twice. Use only the real data the tools return — do not invent weather or commute numbers.
llm:
    provider: ollama
    model: gemma4:latest
    temperature: 0.2
    max_tokens: 8152
tools:
    - name: get_briefing_data
      description: Fetch today's weather and the home-to-work driving commute in one call. Returns both as text. Call this only once.
      python_file: ~/.soulacy/tools/get_briefing_data.py
      parameters:
        type: object
        properties:
            weather_location:
                type: string
                description: City and state for weather, e.g. "Buffalo Grove, IL"
            commute_origin:
                type: string
                description: Home street address
            commute_destination:
                type: string
                description: Work street address
        required: [weather_location, commute_origin, commute_destination]
    - name: send_telegram
      description: Send a text message to a Telegram chat.
      python_file: ~/.soulacy/tools/send_telegram.py
      parameters:
        type: object
        properties:
            text:
                type: string
                description: The message text to send
            chat_id:
                type: string
                description: The Telegram chat ID to send to
        required: [text, chat_id]
memory:
    read_scopes:
        - agent
        - global
    write_scopes:
        - agent
    max_tokens: 50
max_turns: 6
stream_reply: false
enabled: true
