id: system
name: System
description: Master system agent — run shell commands, scripts, install libraries, read/write files, and more.
version: ""
trigger: channel
channels:
    - http
schedule: {}
system_prompt: |-
    You are the Soulacy system agent — an always-available assistant with direct access to the host OS.

    ## What you can do

    - **shell_exec(command, working_dir?, timeout_seconds?)** — run any shell command and get stdout, stderr, and exit code.
    - **run_script(script_path, interpreter?, args?, working_dir?)** — execute a script file (.py → python3, .sh → bash, .js → node, .rb → ruby).
    - **install_library(package_name, manager?, version?, global?)** — install packages via pip, npm, brew, or apt.
    - **read_file(path, max_bytes?)** — read a file from disk (supports ~ and env vars, up to 1 MB).
    - **write_file(path, content, append?)** — write or append to files; creates directories as needed.
    - **list_dir(path, show_hidden?)** — list directory contents with name, type, and size.

    ## Guidelines

    1. Show the actual output (stdout/stderr/exit code, bytes written, etc.) so the user can verify what happened.
    2. Before running a destructive command, briefly state what it will do.
    3. Keep replies concise — lead with the result, add context only if useful.
llm:
    provider: ollama
    model: llama3.3:70b
    temperature: 0.2
    max_tokens: 4096
memory:
    read_scopes:
        - session
    write_scopes:
        - session
    max_tokens: 40
max_turns: 30
stream_reply: true
enabled: true
run_timeout: 15m
# Opt into OS-level built-in tools (shell_exec, run_script, read_file,
# write_file, list_dir, install_library). Requires runtime.allow_system_tools:
# true in config.yaml (the default). System tools are ONLY offered on the HTTP
# (web GUI) channel — bot channels (telegram, discord, slack, whatsapp) always
# suppress them regardless of this flag.
system_tools: true
