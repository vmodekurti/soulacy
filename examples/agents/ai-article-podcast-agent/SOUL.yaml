id: ai-article-podcast-agent
name: AI Article Podcast Agent
description: |
    Every morning at 7 AM, aggregates and ranks AI news from ~25 sources,
    prioritising agentic AI, new capabilities, expert/founder commentary,
    and workflow-automation stories. Curated sources include the labs
    (OpenAI, Anthropic, Google AI, DeepMind, Meta AI, Mistral, HF), founder
    blogs (Sam Altman, Karpathy, Cognition, LangChain), expert commentary
    (Import AI, Ethan Mollick's One Useful Thing, AI Snake Oil, Last Week
    in AI, Stratechery), arXiv research, and premium AI tech press. Builds
    a NotebookLM notebook from the top stories, generates a focused
    10-minute audio overview, and sends the link via Telegram.
version: "1.0"
trigger: cron
schedule:
    cron: 0 7 * * *
system_prompt: |
    You run once each morning at 7 AM. Your only job is to call
    `ai_daily_pipeline` exactly once with:
        chat_id        = "8546291328"
        max_age_hours  = 24
        limit          = 10

    Do NOT call any other tools. Do NOT decompose the work — the pipeline
    tool aggregates AI news from ~25 sources (lab announcements, founder
    blogs, expert commentary, arXiv, premium AI tech press), ranks each
    article by source weight + priority-topic match + recency, dedupes
    across sources, picks the top 10, builds a NotebookLM notebook,
    generates a focused 10-minute audio overview, and sends the link to
    the Telegram chat.

    Priority topics (the pipeline scores higher when articles match these,
    so the podcast leads with them):
      • Agentic AI — autonomous agents, tool use, MCP, computer use,
        agent frameworks (LangGraph, CrewAI, AutoGen).
      • AI advancements & new capabilities — frontier models, reasoning,
        multimodal, context length, throughput.
      • Workflow automation — AI replacing or augmenting knowledge work,
        enterprise adoption, productivity case studies.
      • Expert and founder voices — Altman, Amodei, Hassabis, Karpathy,
        Mollick, researchers, op-eds, interviews.
      • Major model releases (GPT-5, Claude 4, Gemini 3, Llama 4, etc).
      • Safety/governance — only briefly when material.

    The pipeline is a single atomic operation that takes 5-15 minutes total.
    After it returns, your final reply should be the string it returned
    (or a one-sentence summary of the error if it raised). That's it.
llm:
    provider: ollama
    model: qwen2.5:72b
    temperature: 0.1
    max_tokens: 8152
    # Hard guard against the GUI-dropdown-fat-finger failure mode that
    # cost paid credit on 2026-05-27. The engine refuses to start a run
    # whose `provider` isn't on this list — widen only if you genuinely
    # want this cron-driven agent to dial out to a paid API.
    allowed_providers:
        - ollama
# Cron-driven; nobody is watching the actionlog at 7am. When a run
# errors, ping the same Telegram chat the success goes to so the
# operator finds out same-day instead of "no podcast for a week".
notify_on_failure:
    channel: telegram
    to: "8546291328"
    include_error: true
    template: "🚨 Daily AI podcast failed: {error}"
tools:
    - name: ai_daily_pipeline
      description: |
        Run the entire daily AI podcast pipeline end-to-end: aggregate latest
        AI articles from major tech publications (TechCrunch, The Verge,
        VentureBeat, Ars Technica, Google AI blog, Hugging Face), create a
        date-tagged NotebookLM notebook with them as sources, generate an
        Audio Overview, then send the notebook URL to the given Telegram chat.
        Blocks for 5–10 minutes while NotebookLM renders the podcast. Returns
        a short status string.
      python_file: ~/.soulacy/tools/ai_daily_pipeline.py
      parameters:
        properties:
            chat_id:
                description: Telegram chat ID to deliver the podcast link to.
                type: string
            limit:
                description: Max articles to include. Default 8.
                type: integer
            max_age_hours:
                description: Article freshness window. Default 24.
                type: integer
        required:
            - chat_id
        type: object
      timeout: 30m
memory:
    read_scopes:
        - session
    write_scopes:
        - session
    max_tokens: 0
max_turns: 2
stream_reply: false
enabled: true
run_timeout: 45m
