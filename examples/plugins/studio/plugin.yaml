manifest_schema: 2

id: studio
name: Studio
version: 0.1.0
description: >-
  Visual capability studio for Soulacy. M0 scaffold: mounts a sandboxed UI page
  in the gateway web portal that lists the available agents, tools and providers
  as a draggable palette. The full visual canvas (xyflow) arrives in a later
  milestone.
author: Soulacy
license: Apache-2.0

# GUI mount (manifest v2). `static` is the UI directory relative to this plugin
# root; the gateway serves it at GET /plugins/studio/ui/* and the Svelte shell
# renders it in a sandboxed iframe with a scoped plugin token in the URL
# fragment (#token=...). Validated by internal/plugins/manifest2.go.
gui:
  nav:
    label: Studio
    icon: "🎬"
  static: ui

# Capability grants (internal/caps). Plugins are default-deny principals.
# NOTE: the host's capability registry currently exposes only three caps —
# vector.search, channel.send and events.subscribe (internal/caps/caps.go) —
# and the plugin route gate (internal/gateway/plugins.go pluginRoutePolicy)
# only admits plugin tokens to /api/v1/health and /api/v1/knowledge/*/search.
# There is NO read capability for agents/tools/providers yet, so we declare no
# permissions here: a manifest asking for an unregistered cap is REFUSED at
# load (caps.NewSet). The UI degrades gracefully when those reads 403.
# See README.md "Known blocker" for the gateway change needed to unlock them.
permissions: []
