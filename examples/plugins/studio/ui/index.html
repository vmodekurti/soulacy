<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Self-contained sandbox CSP. All JS/CSS is local (script-src/style-src
    'self'); no runtime CDN fetches. 'unsafe-inline' is allowed for STYLES only
    because @xyflow/svelte positions nodes/edges with inline style attributes
    (transform/visibility) at runtime — without it the canvas can't lay out.
    Scripts remain 'self' (no inline JS). The iframe is sandboxed with an
    opaque origin, so this surface is tightly contained.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; img-src 'self' data:; font-src 'self';" />
