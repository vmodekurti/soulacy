run:
  timeout: 5m
  go: '1.25'

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - (net/http.ResponseWriter).Write
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
  govet:
    enable-all: false
  staticcheck:
    checks: ["all", "-QF*", "-S1011", "-SA9003", "-S1039", "-SA1019"]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - third_party
    - builtin
    - examples
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: 'internal/audit/audit\.go'
      linters:
        - unused
      text: "mu is unused"
    - path: 'internal/plugins/loader\.go'
      linters:
        - unused
      text: "resolveToolHandler is unused"
